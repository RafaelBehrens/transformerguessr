<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TransformerGuessr — Labeler</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font: 14px/1.4 system-ui, -apple-system, sans-serif; background: #111; color: #eee; }
  header {
    display: flex; gap: 8px; align-items: center; padding: 8px 12px;
    background: #1b1b1b; border-bottom: 1px solid #333; flex-wrap: wrap;
  }
  header button, header label.btn {
    background: #2a2a2a; color: #eee; border: 1px solid #444; padding: 6px 12px;
    border-radius: 4px; cursor: pointer; font-size: 13px;
  }
  header button:hover, header label.btn:hover { background: #333; }
  header .spacer { flex: 1; }
  header .stat { color: #999; font-size: 12px; }
  main { display: flex; height: calc(100vh - 49px); }
  #canvasWrap {
    flex: 1; overflow: auto; background: #000; position: relative;
  }
  #imgHolder { position: relative; display: inline-block; user-select: none; }
  #imgHolder img { display: block; max-width: none; }
  .box {
    position: absolute; border: 2px solid #2ecc71;
    background: rgba(46, 204, 113, 0.12); cursor: pointer;
  }
  .box.selected { border-color: #f1c40f; background: rgba(241, 196, 15, 0.2); }
  .box .tag {
    position: absolute; top: -22px; left: -2px; background: #2ecc71;
    color: #000; font-size: 11px; font-weight: 600;
    padding: 1px 6px; border-radius: 3px 3px 0 0; white-space: nowrap;
    max-width: 200px; overflow: hidden; text-overflow: ellipsis;
  }
  .box.selected .tag { background: #f1c40f; }
  .box.unlabeled { border-color: #e74c3c; background: rgba(231, 76, 60, 0.12); }
  .box.unlabeled .tag { background: #e74c3c; color: #fff; }
  #drawBox {
    position: absolute; border: 2px dashed #3498db;
    background: rgba(52, 152, 219, 0.15); pointer-events: none;
  }
  aside {
    width: 320px; background: #1b1b1b; border-left: 1px solid #333;
    overflow-y: auto; padding: 12px;
  }
  aside h3 { margin: 0 0 8px; font-size: 13px; text-transform: uppercase; color: #999; letter-spacing: 0.5px; }
  .form { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; padding: 12px; background: #222; border-radius: 6px; border: 1px solid #333; }
  .form label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }
  .form input, .form select {
    background: #111; border: 1px solid #444; color: #eee;
    padding: 6px 8px; border-radius: 4px; font: inherit;
  }
  .form .row { display: flex; gap: 8px; }
  .form .row > * { flex: 1; }
  .form .actions { display: flex; gap: 8px; margin-top: 4px; }
  .form .actions button {
    flex: 1; background: #2ecc71; color: #000; border: none; padding: 8px;
    border-radius: 4px; cursor: pointer; font-weight: 600;
  }
  .form .actions button.del { background: #e74c3c; color: #fff; flex: 0 0 auto; padding: 8px 14px; }
  .form .actions button.cancel { background: #555; color: #eee; flex: 0 0 auto; padding: 8px 14px; }
  .list-item {
    padding: 8px; border-bottom: 1px solid #2a2a2a; cursor: pointer;
    font-size: 13px; display: flex; justify-content: space-between; align-items: center;
  }
  .list-item:hover { background: #222; }
  .list-item.selected { background: #2d2d00; }
  .list-item .meta { color: #888; font-size: 11px; }
  .list-item .tier { padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; text-transform: uppercase; }
  .tier.easy { background: #27ae60; color: #000; }
  .tier.medium { background: #f39c12; color: #000; }
  .tier.hard { background: #c0392b; color: #fff; }
  .empty { color: #666; text-align: center; padding: 24px; font-style: italic; }
  .help {
    background: #1a2833; border: 1px solid #2c4a66; color: #9ec2e0;
    padding: 8px 12px; border-radius: 4px; font-size: 12px; margin-bottom: 12px;
  }
  kbd {
    background: #333; border: 1px solid #555; border-radius: 3px;
    padding: 1px 5px; font-size: 11px; font-family: ui-monospace, monospace;
  }
</style>
</head>
<body>
<header>
  <label class="btn">
    Load image
    <input type="file" id="fileInput" accept="image/*" hidden>
  </label>
  <label class="btn">
    Import JSON
    <input type="file" id="importInput" accept="application/json" hidden>
  </label>
  <button id="exportBtn">Export JSON</button>
  <button id="clearBtn">Clear all</button>
  <span class="spacer"></span>
  <span class="stat" id="stat">0 boxes</span>
</header>
<main>
  <div id="canvasWrap">
    <div id="imgHolder">
      <img id="img" alt="">
      <div id="drawBox" hidden></div>
    </div>
  </div>
  <aside>
    <div class="help">
      <strong>How to use:</strong><br>
      1. Load the PNG<br>
      2. Click-drag on the image to draw a box around a card<br>
      3. Fill in the metadata and save<br>
      4. Click a box or list item to edit<br>
      5. Export JSON when done<br>
      <br>
      <kbd>Del</kbd> removes selected · <kbd>Esc</kbd> cancels draw
    </div>
    <div id="formPanel"></div>
    <h3>Labeled boxes</h3>
    <div id="list"></div>
  </aside>
</main>
<script>
(() => {
  const state = {
    imgLoaded: false,
    imgNaturalW: 0, imgNaturalH: 0,
    scale: 1,
    boxes: [],
    selectedId: null,
    drawStart: null,
    nextId: 1,
  };

  const $ = (id) => document.getElementById(id);
  const img = $('img');
  const imgHolder = $('imgHolder');
  const drawBox = $('drawBox');
  const listEl = $('list');
  const formPanel = $('formPanel');
  const stat = $('stat');

  const STORAGE_KEY = 'tg_labeler_v1';

  function saveLocal() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ boxes: state.boxes, nextId: state.nextId })); }
    catch {}
  }
  function loadLocal() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const data = JSON.parse(raw);
      state.boxes = data.boxes || [];
      state.nextId = data.nextId || (state.boxes.length + 1);
    } catch {}
  }

  function render() {
    // remove existing .box elements
    imgHolder.querySelectorAll('.box').forEach(el => el.remove());
    if (!state.imgLoaded) return;
    state.boxes.forEach(b => {
      const el = document.createElement('div');
      el.className = 'box' + (b.id === state.selectedId ? ' selected' : '') + (!b.name ? ' unlabeled' : '');
      el.style.left = (b.x * state.scale) + 'px';
      el.style.top = (b.y * state.scale) + 'px';
      el.style.width = (b.w * state.scale) + 'px';
      el.style.height = (b.h * state.scale) + 'px';
      el.dataset.id = b.id;
      const tag = document.createElement('div');
      tag.className = 'tag';
      tag.textContent = b.name || '(unlabeled)';
      el.appendChild(tag);
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        selectBox(b.id);
      });
      imgHolder.appendChild(el);
    });
    renderList();
    renderForm();
    stat.textContent = `${state.boxes.length} box${state.boxes.length === 1 ? '' : 'es'}`;
  }

  function renderList() {
    listEl.innerHTML = '';
    if (state.boxes.length === 0) {
      listEl.innerHTML = '<div class="empty">No boxes yet — draw one on the image.</div>';
      return;
    }
    state.boxes.forEach(b => {
      const el = document.createElement('div');
      el.className = 'list-item' + (b.id === state.selectedId ? ' selected' : '');
      const name = b.name || '(unlabeled)';
      const meta = [b.company, b.year].filter(Boolean).join(' · ');
      el.innerHTML = `
        <div>
          <div>${escapeHtml(name)}</div>
          <div class="meta">${escapeHtml(meta) || '&mdash;'}</div>
        </div>
        ${b.tier ? `<span class="tier ${b.tier}">${b.tier}</span>` : ''}
      `;
      el.addEventListener('click', () => selectBox(b.id));
      listEl.appendChild(el);
    });
  }

  function renderForm() {
    const b = state.boxes.find(x => x.id === state.selectedId);
    if (!b) { formPanel.innerHTML = ''; return; }
    formPanel.innerHTML = `
      <div class="form">
        <label>Model name</label>
        <input id="fName" value="${escapeAttr(b.name || '')}" placeholder="e.g. GPT-3">
        <div class="row">
          <div>
            <label>Company</label>
            <input id="fCompany" value="${escapeAttr(b.company || '')}" placeholder="e.g. OpenAI">
          </div>
          <div>
            <label>Year</label>
            <input id="fYear" type="number" min="2015" max="2030" value="${b.year || ''}" placeholder="2024">
          </div>
        </div>
        <label>Difficulty tier</label>
        <select id="fTier">
          <option value="">(unset)</option>
          <option value="easy" ${b.tier === 'easy' ? 'selected' : ''}>Easy — major companies</option>
          <option value="medium" ${b.tier === 'medium' ? 'selected' : ''}>Medium — second tier</option>
          <option value="hard" ${b.tier === 'hard' ? 'selected' : ''}>Hard — lesser known</option>
        </select>
        <label>Notes (optional)</label>
        <input id="fNotes" value="${escapeAttr(b.notes || '')}" placeholder="key feature / hint">
        <div class="actions">
          <button id="fSave">Save</button>
          <button class="cancel" id="fCancel">Close</button>
          <button class="del" id="fDel">Delete</button>
        </div>
      </div>
    `;
    $('fSave').addEventListener('click', () => {
      b.name = $('fName').value.trim();
      b.company = $('fCompany').value.trim();
      b.year = $('fYear').value ? parseInt($('fYear').value, 10) : null;
      b.tier = $('fTier').value;
      b.notes = $('fNotes').value.trim();
      saveLocal();
      render();
    });
    $('fCancel').addEventListener('click', () => {
      state.selectedId = null;
      render();
    });
    $('fDel').addEventListener('click', () => {
      state.boxes = state.boxes.filter(x => x.id !== b.id);
      state.selectedId = null;
      saveLocal();
      render();
    });
    setTimeout(() => $('fName').focus(), 0);
  }

  function selectBox(id) {
    state.selectedId = id;
    render();
  }

  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function escapeAttr(s) { return escapeHtml(s); }

  // Image loading
  $('fileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    img.onload = () => {
      state.imgNaturalW = img.naturalWidth;
      state.imgNaturalH = img.naturalHeight;
      state.scale = 1;
      state.imgLoaded = true;
      render();
    };
    img.src = url;
  });

  // Draw boxes
  imgHolder.addEventListener('mousedown', (e) => {
    if (!state.imgLoaded) return;
    if (e.target.classList.contains('box') || e.target.classList.contains('tag')) return;
    const rect = imgHolder.getBoundingClientRect();
    const x = (e.clientX - rect.left) / state.scale;
    const y = (e.clientY - rect.top) / state.scale;
    state.drawStart = { x, y };
    drawBox.hidden = false;
    drawBox.style.left = (x * state.scale) + 'px';
    drawBox.style.top = (y * state.scale) + 'px';
    drawBox.style.width = '0px';
    drawBox.style.height = '0px';
    e.preventDefault();
  });

  window.addEventListener('mousemove', (e) => {
    if (!state.drawStart) return;
    const rect = imgHolder.getBoundingClientRect();
    const x = (e.clientX - rect.left) / state.scale;
    const y = (e.clientY - rect.top) / state.scale;
    const x0 = Math.min(x, state.drawStart.x);
    const y0 = Math.min(y, state.drawStart.y);
    const w = Math.abs(x - state.drawStart.x);
    const h = Math.abs(y - state.drawStart.y);
    drawBox.style.left = (x0 * state.scale) + 'px';
    drawBox.style.top = (y0 * state.scale) + 'px';
    drawBox.style.width = (w * state.scale) + 'px';
    drawBox.style.height = (h * state.scale) + 'px';
  });

  window.addEventListener('mouseup', (e) => {
    if (!state.drawStart) return;
    const rect = imgHolder.getBoundingClientRect();
    const x = (e.clientX - rect.left) / state.scale;
    const y = (e.clientY - rect.top) / state.scale;
    const x0 = Math.max(0, Math.min(x, state.drawStart.x));
    const y0 = Math.max(0, Math.min(y, state.drawStart.y));
    const w = Math.min(state.imgNaturalW - x0, Math.abs(x - state.drawStart.x));
    const h = Math.min(state.imgNaturalH - y0, Math.abs(y - state.drawStart.y));
    state.drawStart = null;
    drawBox.hidden = true;
    if (w < 15 || h < 15) return; // ignore tiny / accidental
    const box = {
      id: state.nextId++,
      x: Math.round(x0), y: Math.round(y0),
      w: Math.round(w), h: Math.round(h),
      name: '', company: '', year: null, tier: '', notes: '',
    };
    state.boxes.push(box);
    state.selectedId = box.id;
    saveLocal();
    render();
  });

  // Keyboard
  window.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'Escape') {
      if (state.drawStart) {
        state.drawStart = null;
        drawBox.hidden = true;
      } else {
        state.selectedId = null;
        render();
      }
    }
    if ((e.key === 'Delete' || e.key === 'Backspace') && state.selectedId != null) {
      state.boxes = state.boxes.filter(x => x.id !== state.selectedId);
      state.selectedId = null;
      saveLocal();
      render();
    }
  });

  // Export
  $('exportBtn').addEventListener('click', () => {
    const payload = {
      imageWidth: state.imgNaturalW,
      imageHeight: state.imgNaturalH,
      boxes: state.boxes.map(b => ({
        name: b.name, company: b.company, year: b.year, tier: b.tier, notes: b.notes,
        x: b.x, y: b.y, w: b.w, h: b.h,
      })),
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'models.json'; a.click();
    URL.revokeObjectURL(url);
  });

  // Import
  $('importInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        const incoming = (data.boxes || []).map((b, i) => ({
          id: state.nextId + i,
          x: b.x, y: b.y, w: b.w, h: b.h,
          name: b.name || '', company: b.company || '', year: b.year || null,
          tier: b.tier || '', notes: b.notes || '',
        }));
        state.boxes = incoming;
        state.nextId += incoming.length + 1;
        saveLocal();
        render();
      } catch (err) {
        alert('Invalid JSON: ' + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  $('clearBtn').addEventListener('click', () => {
    if (!confirm('Delete all boxes? This cannot be undone.')) return;
    state.boxes = [];
    state.selectedId = null;
    state.nextId = 1;
    saveLocal();
    render();
  });

  // Restore from localStorage on load
  loadLocal();
  render();
})();
</script>
</body>
</html>
